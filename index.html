<!DOCTYPE html>

<body>

        <h1>Backpack</h1>

                <option value="studentBagOption">Student</option>

    <main class="layout">

            <details>

        <!-- CENTER -->
        <section class="center-content">
            <img id="mainImg"
            src="https://images.pexels.com/photos/9321607/pexels-photo-9321607.jpeg">
        </section>
        
        <!-- RIGHT -->
        <aside class="right-sidebar">
            <h3>Tools</h3>
            
            <button>Tool 1</button>
            <button>Tool 2</button>
