<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <link rel="stylesheet" href="profile_style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar">
        <!-- logo name and logo image -->
        <a href="index.html" class="logo-link">
            <img class="logo" src="images/Logo.png">
        </a>

        <div class="nav-links">
            <a href="">Donate</a>
            <a href="">Subscription</a>

            <a href="profile.html">
                <img class="profile-img" src="https://images.pexels.com/photos/32703420/pexels-photo-32703420.jpeg">
            </a>
        </div>
    </header>


    <div class="container">

        <!-- Sidebar -->
        <div class="left sidebar">
            <button onclick="showSection('profile')" data-section="profile" class="active">Profile</button>
            <button onclick="showSection('settings')" data-section="settings">Settings</button>
            <button onclick="showSection('appearance')" data-section="appearance">Appearance</button>
            <button onclick="showSection('logout')" data-section="logout">Logout</button>
        </div>

        <!-- Right Side -->
        <div class="right">

            <!-- Profile -->
            <div class="card section-box" id="profile">

                <div class="topbar">
                    <div>
                        <h2>Welcome, Sumit</h2>
                        <p class="sub-text">Today's Dashboard</p>
                    </div>
                </div>

                <div class="profile-header">
                    <img class="profile-img" src="https://images.pexels.com/photos/35164363/pexels-photo-35164363.jpeg">

                    <div>
                        <h3>Sumit Sharma</h3>
                        <p class="sub-text">sumit@email.com</p>
                    </div>

                    <button class="edit-btn">Edit</button>
                </div>

                <div class="form-grid">
                    <div>
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name">
                    </div>

                    <div>
                        <label>Nick Name</label>
                        <input type="text" placeholder="Nick Name">
                    </div>

                    <div>
                        <label>Gender</label>
                        <select>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>

                    <div>
                        <label>Country</label>
                        <select>
                            <option>India</option>
                            <option>USA</option>
                        </select>
                    </div>

                    <div>
                        <label>Language</label>
                        <select>
                            <option>English</option>
                            <option>Hindi</option>
                        </select>
                    </div>

                    <div>
                        <label>Time Zone</label>
                        <select>
                            <option>IST</option>
                            <option>UTC</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <h4>Email Address</h4>
                    <p>sumit@email.com</p>
                    <button class="edit-btn">+ Add Email</button>
                </div>

            </div>

            <!-- settings -->
            <div class="card section-box" id="settings">
                <h2>Settings</h2>
                <p>Settings content here...</p>
            </div>

            <!-- Appearance -->
            <div class="card section-box" id="appearance">
                <h2>Appearance</h2>
                <p>Theme / Dark mode etc...</p>
            </div>

            <!-- logout -->
            <div class="card section-box" id="logout">
                <h2>Logout</h2>
                <p>Are you sure?</p>
            </div>

        </div>

    </div>

    <script src="profile_script.js"></script>
</body>

</html>
