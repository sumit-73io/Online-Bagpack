<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bagpack</title>
    <link rel="stylesheet" href="homePage_style.css">
    <link rel="icon" type="image/x-icon" href="images/titleWhite.png">
</head>



<body>

    <!-- HEADER -->
    <header class="navbar">
        <!-- logo name and logo image -->
        <a href="index.html" class="logo-link">
            <img class="logo" src="images/Logo.png">
        </a>

        <div class="nav-links">
            <a href="">Donate</a>
            <a href="">Subscription</a>

            <select id="bagsOption">
                <option value="bags">Bags</option>
                <option value="studentBagOption">Student</option>
                <option value="officeBagOption">Office</option>
                <option value="travelBagOption">Travel</option>
            </select>

            <a href="profile.html">
                <img class="profile-img" src="https://images.pexels.com/photos/32703420/pexels-photo-32703420.jpeg">
            </a>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <main class="layout">

        <!-- left sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Contains</h3>
                <button id="toggleSidebar" class="toggle-btn">☰</button>
            </div>
            <!-- <input type="file" id="fileInput">
            <button id="uploadBtn">Upload File</button> -->

            <div class="menu-group" data-menu="student">
                <details data-subject="books">
                    <summary>Books</summary>
                    <a href="#physics">Physics</a>
                    <a href="#chemistry">Chemistry</a>
                    <a href="#math">Math</a>
                </details>

                <details data-subject="tests">
                    <summary>Tests</summary>
                    <a href="#weekly">Weekly</a>
                    <a href="#monthly">Monthly</a>
                </details>

                <details data-subject="assignment">
                    <summary>Assignment</summary>
                    <a href="#assignment1">1st Semester</a>
                    <a href="#assignment2">2nd Semester</a>
                </details>
            </div>

            <div class="menu-group" data-menu="office">
                <details>
                    <summary>Office</summary>
                    <a href="#calendar">Calendar</a>
                    <a href="#documents">Documents</a>
                    <a href="#files">Files</a>
                    <a href="#images">Images</a>
                </details>
            </div>
            <div class="menu-group" data-menu="travel">
                <details>
                    <summary>Travel</summary>
                    <a href="#maps">Maps</a>
                    <a href="#schedule">Schedule</a>
                    <a href="#photos">Photos</a>
                    <a href="#videos">Videos</a>
                </details>
            </div>
            <div class="menu-group" data-menu="default">
                <a href="chat.html">Chat</a>
            </div>

        </aside>

        <!-- CENTER -->
        <section class="center-content">

            <div class="file-system">

                <!-- 🔹 Top Bar -->
                <div class="file-topbar">

                    <!-- Path -->
                    <div class="path" id="pathBar">
                        Home
                    </div>

                    <!-- Options -->
                    <div class="options">
                        <button id="menuBtn" onclick="openMenu()">⋮</button>

                        <div class="dropdown" id="dropdownMenu">
                            <button onclick="createFolder()">📁 New Folder</button>
                            <button onclick="triggerUpload()">📤 Upload</button>
                            <button onclick="enableSelectionMode()">✅ Select</button>
                            <button onclick="renameItem()">✏ Rename</button>
                            <button onclick="deleteItem()">🗑 Delete</button>
                        </div>
                    </div>

                </div>

                <!-- 🔹 File Grid -->
                <div class="file-grid" id="fileGrid">
                    <!-- Files & folders will come here -->
                </div>

            </div>

            <!-- Hidden file input -->
            <input type="file" id="fileInput" hidden>



            <!-- <input type="file" id="fileInput">
            <button id="uploadBtn">Upload File</button>
            <img id="mainImg" src="" alt=""> -->


        </section>

        <!-- RIGHT -->
        <aside class="right-sidebar">

            <div class="tools-header">
                <h3>Tools</h3>
                <button id="toggleTools" class="toggle-btn always-visible">☰</button>
            </div>

            <div class="tools-content">

                <button onclick="toggleStopwatch()">Stopwatch</button>
                <button>Tool 2</button>
                <button>Tool 3</button>

                <button>
                    <img src="https://cdn-icons-png.flaticon.com/128/891/891175.png">
                    Calculator
                </button>

            </div>
        </aside>





        <div id="stopwatch" class="tool-box">

            <h4>⏱ Stopwatch</h4>

            <div id="time">00:00:00</div>

            <div class="controls">
                <button id="startBtn">Start</button>
                <button id="stopBtn">Stop</button>
                <button id="resetBtn">Reset</button>
            </div>

        </div>

    </main>


    <script src="homePage_script.js"></script>
</body>

</html>
